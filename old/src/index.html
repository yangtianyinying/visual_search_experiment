<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视觉搜索实验（jsPsych）</title>
  <link rel="stylesheet" href="./vendor/jspsych/jspsych.css" />
  <style>
    html, body {
      height: 100%;
    }
    body {
      background: #ffffff;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      margin: 0;
    }
    #jspsych-target {
      min-height: 100vh;
    }
    .jspsych-content {
      max-width: 1100px;
    }
    .center-screen {
      min-height: 70vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .exp-wrap {
      max-width: 900px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 20px;
    }
    .feedback {
      font-size: 38px;
      font-weight: 700;
    }
    .fb-correct { color: #2e7d32; }
    .fb-wrong { color: #c62828; }
    .fb-slow { color: #f9a825; }
    .fixation {
      font-size: 52px;
      font-weight: 700;
      text-align: center;
      line-height: 1;
    }
    .stim-wrap {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    #stim-canvas {
      width: 900px;
      height: 650px;
      display: inline-block;
      background: #ffffff;
    }
    .trial-progress {
      margin-top: 12px;
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>

  <script src="./vendor/jspsych/jspsych.js"></script>
  <script src="./vendor/jspsych/plugin-fullscreen.js"></script>
  <script src="./vendor/jspsych/plugin-html-keyboard-response.js"></script>
  <script src="./vendor/jspsych/plugin-html-button-response.js"></script>
  <script src="./vendor/jspsych/plugin-survey-html-form.js"></script>
  <script>
    (async function () {
      "use strict";
      const mountEl = document.getElementById("jspsych-target");

      function showFatalError(message) {
        if (!mountEl) return;
        mountEl.innerHTML = `
          <div class="exp-wrap">
            <h2>运行错误</h2>
            <p>实验脚本发生异常，请截图此信息发给开发者：</p>
            <pre style="white-space:pre-wrap;color:#b71c1c;background:#fff3f3;padding:12px;border:1px solid #ffcdd2;border-radius:6px;">${String(message)}</pre>
          </div>
        `;
      }

      window.addEventListener("error", function (event) {
        showFatalError(event.message || "未知脚本错误");
      });

      window.addEventListener("unhandledrejection", function (event) {
        const reason = event.reason && (event.reason.stack || event.reason.message || String(event.reason));
        showFatalError(reason || "未处理的 Promise 异常");
      });

      try {

      if (typeof initJsPsych !== "function") {
        mountEl.innerHTML = `
          <div class="exp-wrap">
            <h2>实验加载失败</h2>
            <p>未能加载本地 jsPsych 脚本，请确认 <code>src/vendor/jspsych</code> 文件完整。</p>
            <p>建议：在项目根目录启动本地静态服务器后访问 <code>/src/index.html</code>。</p>
          </div>
        `;
        return;
      }
      if (
        typeof jsPsychFullscreen === "undefined" ||
        typeof jsPsychHtmlKeyboardResponse === "undefined" ||
        typeof jsPsychHtmlButtonResponse === "undefined" ||
        typeof jsPsychSurveyHtmlForm === "undefined"
      ) {
        mountEl.innerHTML = `
          <div class="exp-wrap">
            <h2>实验加载失败</h2>
            <p>jsPsych 插件脚本未完整加载，请确认 <code>src/vendor/jspsych</code> 下插件文件存在。</p>
          </div>
        `;
        return;
      }

      const FIXATION_MS = 500;
      const STIM_MS = 2000;
      const FEEDBACK_MS = 800;
      const ITI_MIN_MS = 400;
      const ITI_MAX_MS = 800;
      const TARGET_KEY = " ";
      const CSV_PATH = "../doc/conditions_48trials.csv";
      const GRID_COLS = 5;
      const GRID_ROWS = 5;
      const FEEDBACK_TEXT = {
        correct: "CORRECT!",
        wrong: "WRONG!",
        slow: "TOO SLOW!"
      };

      const FALLBACK_CSV = `block,setSize,targetPresent
1,5,1
1,5,0
1,5,1
1,5,0
1,10,1
1,10,0
1,10,1
1,10,0
1,15,1
1,15,0
1,15,1
1,15,0
1,20,1
1,20,0
1,20,1
1,20,0
2,5,1
2,5,0
2,5,1
2,5,0
2,10,1
2,10,0
2,10,1
2,10,0
2,15,1
2,15,0
2,15,1
2,15,0
2,20,1
2,20,0
2,20,1
2,20,0
3,5,1
3,5,0
3,5,1
3,5,0
3,10,1
3,10,0
3,10,1
3,10,0
3,15,1
3,15,0
3,15,1
3,15,0
3,20,1
3,20,0
3,20,1
3,20,0`;

      function parseCsv(text) {
        const lines = text.trim().split(/\r?\n/).filter(Boolean);
        const header = lines[0].split(",").map((s) => s.trim());
        const bi = header.indexOf("block");
        const si = header.indexOf("setSize");
        const ti = header.indexOf("targetPresent");
        if (bi < 0 || si < 0 || ti < 0) {
          throw new Error("conditions_48trials.csv 字段不正确，需要 block,setSize,targetPresent");
        }

        const parsed = [];
        for (let i = 1; i < lines.length; i++) {
          const p = lines[i].split(",").map((s) => s.trim());
          const block = Number.parseInt(p[bi], 10);
          const setSize = Number.parseInt(p[si], 10);
          const targetPresent = p[ti] === "1" || p[ti].toLowerCase() === "true";
          if (Number.isNaN(block) || Number.isNaN(setSize)) continue;
          parsed.push({
            trialN: parsed.length + 1,
            block,
            setSize,
            targetPresent: targetPresent ? 1 : 0
          });
        }
        return parsed;
      }

      async function loadTrials() {
        try {
          const resp = await fetch(CSV_PATH, { cache: "no-store" });
          if (!resp.ok) throw new Error(String(resp.status));
          const text = await resp.text();
          const trials = parseCsv(text);
          if (trials.length !== 48) {
            console.warn("CSV 条件数不是 48，实际为:", trials.length);
          }
          return trials;
        } catch (e) {
          console.warn("加载外部 CSV 失败，使用内置回退条件。", e);
          return parseCsv(FALLBACK_CSV);
        }
      }

      const mainTrials = await loadTrials();
      const blocks = [1, 2, 3].map((b) => mainTrials.filter((t) => t.block === b));

      let participantId = "participant";
      let hasDownloaded = false;

      const jsPsych = initJsPsych({
        display_element: mountEl,
        on_finish: function () {
          if (hasDownloaded) return;
          const csv = buildMainCsv(jsPsych);
          downloadCsv(csv, buildFilename());
          hasDownloaded = true;
        }
      });

      window.addEventListener("keydown", function (e) {
        if (e.shiftKey && (e.code === "KeyE" || e.key === "E")) {
          jsPsych.endExperiment("实验已由研究者终止（Shift + E）。");
        }
      });

      const timeline = [];

      timeline.push({
        type: jsPsychFullscreen,
        fullscreen_mode: true,
        message: "<p>实验将进入全屏模式。</p><p>按按钮继续。</p>",
        button_label: "进入全屏"
      });

      timeline.push({
        type: jsPsychSurveyHtmlForm,
        preamble: "<div class='exp-wrap'><h2>被试信息</h2><p>请填写以下信息：</p></div>",
        html: `
          <p><label>participant: <input name="participant" required /></label></p>
          <p><label>age: <input name="age" type="number" min="1" max="120" required /></label></p>
          <p>
            <label>gender:
              <select name="gender" required>
                <option value="">请选择</option>
                <option value="male">男</option>
                <option value="female">女</option>
                <option value="other">其他</option>
              </select>
            </label>
          </p>
        `,
        button_label: "继续",
        on_finish: function (data) {
          let ans = {};
          if (data && typeof data.response === "object" && data.response !== null) {
            ans = data.response;
          } else if (data && typeof data.responses === "string") {
            try {
              ans = JSON.parse(data.responses);
            } catch (e) {
              ans = {};
            }
          }
          participantId = String(ans.participant || "participant");
          jsPsych.data.addProperties({
            participant: participantId,
            age: ans.age,
            gender: ans.gender,
            expName: "visual_search",
            seed: participantId
          });
        }
      });

      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <div class="exp-wrap">
            <h2>视觉搜索实验</h2>
            <p>本实验共 <strong>3</strong> 个 block，每个 block <strong>16</strong> 个 trial，总计 <strong>48</strong> 个 trial。</p>
            <p>每个 trial 流程：</p>
            <p>注视点 500ms → 刺激呈现（按键或 2s）→ 反馈（CORRECT!/WRONG!/TOO SLOW!）→ 随机 ITI。</p>
            <p><strong>规则：</strong>只有出现<strong>红色正立 T</strong>时才按空格；其余情况（包括红色倒置 T）都不要按键。</p>
            <p>其他 T 的朝向（正/倒）是随机的，请按目标定义作答。</p>
            <p>请尽量又快又准。</p>
          </div>
        `,
        choices: ["开始练习"]
      });

      buildPracticeTimeline(timeline, jsPsych);

      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: "<div class='exp-wrap'><h3>练习结束</h3><p>接下来进入正式实验。</p></div>",
        choices: ["开始正式实验"]
      });

      for (let b = 0; b < blocks.length; b++) {
        const blockTrials = jsPsych.randomization.shuffle(blocks[b].slice());
        blockTrials.forEach((trial, idx) => {
          appendOneTrial(timeline, jsPsych, {
            ...trial,
            blockTrialN: idx + 1,
            blockTrialTotal: blockTrials.length,
            task: "main_trial"
          });
        });

        if (b < blocks.length - 1) {
          timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `
              <div class="exp-wrap">
                <h3>休息时间</h3>
                <p>你已完成第 ${b + 1} / 3 个 block。</p>
                <p>请休息 1-2 分钟，准备好后继续。</p>
              </div>
            `,
            choices: ["继续下一区块"]
          });
        }
      }

      timeline.push({
        type: jsPsychHtmlButtonResponse,
        stimulus: `
          <div class="exp-wrap">
            <h2>实验结束</h2>
            <p>感谢你的参与！数据已自动下载为 CSV 文件。</p>
            <p>如未自动下载，请点击下方按钮手动导出。</p>
          </div>
        `,
        choices: ["手动下载数据"],
        on_finish: function () {
          const csv = buildMainCsv(jsPsych);
          downloadCsv(csv, buildFilename());
          hasDownloaded = true;
        }
      });

      timeline.push({
        type: jsPsychFullscreen,
        fullscreen_mode: false
      });

      jsPsych.run(timeline);

      function buildPracticeTimeline(targetTimeline, jsPsychInstance) {
        const practice = [
          { block: 0, setSize: 5, targetPresent: 1 },
          { block: 0, setSize: 10, targetPresent: 0 },
          { block: 0, setSize: 15, targetPresent: 1 },
          { block: 0, setSize: 20, targetPresent: 0 },
          { block: 0, setSize: 5, targetPresent: 0 },
          { block: 0, setSize: 10, targetPresent: 1 },
          { block: 0, setSize: 15, targetPresent: 0 },
          { block: 0, setSize: 20, targetPresent: 1 }
        ];
        jsPsychInstance.randomization.shuffle(practice).forEach((trial, idx) => {
          appendOneTrial(targetTimeline, jsPsychInstance, {
            ...trial,
            blockTrialN: idx + 1,
            blockTrialTotal: practice.length,
            task: "practice_trial"
          });
        });
      }

      function appendOneTrial(targetTimeline, jsPsychInstance, trialInfo) {
        let stimOnset = "";

        targetTimeline.push({
          type: jsPsychHtmlKeyboardResponse,
          stimulus: "<div class='center-screen'><div class='fixation'>+</div></div>",
          choices: "NO_KEYS",
          trial_duration: FIXATION_MS,
          data: {
            phase: "fixation",
            task: trialInfo.task,
            block: trialInfo.block,
            setSize: trialInfo.setSize,
            targetPresent: trialInfo.targetPresent
          }
        });

        targetTimeline.push({
          type: jsPsychHtmlKeyboardResponse,
          stimulus: function () {
            return `
              <div class="stim-wrap">
                <canvas id="stim-canvas" width="900" height="650"></canvas>
                <div class="trial-progress">
                  ${trialInfo.task === "practice_trial" ? "练习" : `Block ${trialInfo.block}/3`}：
                  第 ${trialInfo.blockTrialN}/${trialInfo.blockTrialTotal} 试次
                </div>
              </div>
            `;
          },
          choices: [TARGET_KEY],
          trial_duration: STIM_MS,
          response_ends_trial: true,
          data: {
            phase: "stimulus",
            task: trialInfo.task,
            block: trialInfo.block,
            setSize: trialInfo.setSize,
            targetPresent: trialInfo.targetPresent
          },
          on_load: function () {
            drawTrialStimuli(trialInfo);
            stimOnset = new Date().toISOString();
          },
          on_finish: function (data) {
            const pressed = data.response === TARGET_KEY;
            const shouldPress = trialInfo.targetPresent === 1;
            data.response_key = pressed ? "space" : "";
            data.timeout = data.response === null;
            data.correct = shouldPress ? (pressed ? 1 : 0) : (pressed ? 0 : 1);
            data.stimOnset = stimOnset;
            data.trialEnd = new Date().toISOString();
          }
        });

        targetTimeline.push({
          type: jsPsychHtmlKeyboardResponse,
          stimulus: function () {
            const d = jsPsychInstance.data.get().last(1).values()[0];
            if (d.targetPresent === 1 && d.timeout) {
              return `<div class="center-screen"><div class="feedback fb-slow">${FEEDBACK_TEXT.slow}</div></div>`;
            }
            if (d.correct === 1) {
              return `<div class="center-screen"><div class="feedback fb-correct">${FEEDBACK_TEXT.correct}</div></div>`;
            }
            return `<div class="center-screen"><div class="feedback fb-wrong">${FEEDBACK_TEXT.wrong}</div></div>`;
          },
          choices: "NO_KEYS",
          trial_duration: FEEDBACK_MS,
          data: {
            phase: "feedback",
            task: trialInfo.task,
            block: trialInfo.block
          }
        });

        targetTimeline.push({
          type: jsPsychHtmlKeyboardResponse,
          stimulus: "",
          choices: "NO_KEYS",
          trial_duration: jsPsychInstance.randomization.randomInt(ITI_MIN_MS, ITI_MAX_MS + 1),
          data: {
            phase: "iti",
            task: trialInfo.task,
            block: trialInfo.block
          }
        });
      }

      function buildMainCsv(jsPsychInstance) {
        const rows = jsPsychInstance.data.get().filter({ task: "main_trial" }).values();
        const summary = rows.map((r, idx) => ({
          trialN: idx + 1,
          block: r.block,
          cond: `setSize_${r.setSize}_target_${r.targetPresent}`,
          stimCount: r.setSize,
          targetPresent: r.targetPresent,
          resp: r.response_key || "",
          corr: r.correct,
          RT: r.rt ?? "",
          timeout: r.timeout ? 1 : 0,
          onset: r.stimOnset || "",
          offset: r.trialEnd || ""
        }));
        return toCsv(summary);
      }

      function drawTrialStimuli(trialInfo) {
        const canvas = document.getElementById("stim-canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const positions = sampleGridPositions(trialInfo.setSize, canvas.width, canvas.height);
        const types = generateStimTypes(trialInfo.setSize, trialInfo.targetPresent);
        for (let i = 0; i < trialInfo.setSize; i++) {
          drawT(ctx, positions[i].x, positions[i].y, 44, types[i].color, types[i].inverted);
        }
      }

      function sampleGridPositions(setSize, width, height) {
        const all = generateGridCenters(width, height);
        shuffle(all);
        return all.slice(0, Math.min(setSize, all.length));
      }

      function generateGridCenters(width, height) {
        const marginX = 90;
        const marginY = 70;
        const cellW = (width - marginX * 2) / GRID_COLS;
        const cellH = (height - marginY * 2) / GRID_ROWS;
        const all = [];
        for (let r = 0; r < GRID_ROWS; r++) {
          for (let c = 0; c < GRID_COLS; c++) {
            all.push({
              x: marginX + (c + 0.5) * cellW,
              y: marginY + (r + 0.5) * cellH
            });
          }
        }
        return all;
      }

      function generateStimTypes(setSize, targetPresent) {
        const arr = [];
        if (targetPresent === 1) {
          // 目标固定为“红色正立 T”
          arr.push({ color: "red", inverted: false });
        }
        while (arr.length < setSize) {
          const inverted = Math.random() < 0.5;
          let color = Math.random() < 0.5 ? "red" : "blue";
          // 干扰项中禁止出现“红色正立 T”，以保证 targetPresent 定义严格成立
          if (!inverted && color === "red") {
            color = "blue";
          }
          arr.push({ color, inverted });
        }
        shuffle(arr);
        return arr;
      }

      function drawT(ctx, x, y, size, color, inverted) {
        const main = color === "red" ? "#d62828" : "#1d4ed8";
        ctx.save();
        ctx.translate(x, y);
        if (inverted) ctx.rotate(Math.PI);
        ctx.fillStyle = main;
        ctx.strokeStyle = main;
        ctx.lineWidth = 4;

        const topW = size;
        const topH = size * 0.22;
        const stemW = size * 0.24;
        const stemH = size * 0.78;

        ctx.fillRect(-topW / 2, -size / 2, topW, topH);
        ctx.fillRect(-stemW / 2, -size / 2 + topH, stemW, stemH);
        ctx.strokeRect(-topW / 2, -size / 2, topW, topH);
        ctx.strokeRect(-stemW / 2, -size / 2 + topH, stemW, stemH);
        ctx.restore();
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
      }

      function toCsv(rows) {
        if (!rows.length) return "";
        const header = Object.keys(rows[0]);
        const body = rows.map((r) =>
          header
            .map((h) => {
              const v = r[h] == null ? "" : String(r[h]);
              if (v.includes(",") || v.includes("\"") || v.includes("\n")) {
                return `"${v.replace(/"/g, "\"\"")}"`;
              }
              return v;
            })
            .join(",")
        );
        return [header.join(","), ...body].join("\n");
      }

      function buildFilename() {
        const date = new Date().toISOString().slice(0, 10);
        return `visual_search_${participantId}_${date}.csv`;
      }

      function downloadCsv(csvText, filename) {
        const blob = new Blob(["\ufeff" + csvText], { type: "text/csv;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      }
      } catch (err) {
        showFatalError(err && (err.stack || err.message || String(err)));
      }
    })();
  </script>
</body>
</html>
